<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>qymdev</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #0e0e0e;
    --muted: #636363;
    --accent: #e84a25;
    --border: #d6d6d6;
    --grid-line: rgba(0, 0, 0, 0.04);
    --card-bg: #ffffff;
    --sans: -apple-system, BlinkMacSystemFont, "Inter Tight", "Inter", "Helvetica Neue", sans-serif;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #fafafa;
      --muted: #8b8b8b;
      --border: #2a2a2a;
      --grid-line: rgba(255, 255, 255, 0.04);
      --card-bg: #141414;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    color: var(--fg);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image: linear-gradient(to right, var(--grid-line) 1px, transparent 1px);
    background-size: calc((100% - 3em) / 12) 100%;
    background-position: 1.5em 0;
    background-attachment: fixed;
    font-variant-numeric: tabular-nums;
    min-height: 100vh;
  }

  .frame { max-width: 1080px; margin: 0 auto; padding: 1.5em 1.5em 5em; }

  .meta-row {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1em;
    font-family: var(--mono);
    font-size: 0.74em;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding: 0.6em 0;
    margin-bottom: 4em;
  }
  .meta-row > div { grid-column: span 3; }
  .meta-row > div:last-child { text-align: right; grid-column: 10 / -1; }
  .meta-row a { color: var(--muted); text-decoration: none; }
  .meta-row a:hover { color: var(--accent); }

  .hero {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5em;
    margin-bottom: 3em;
    align-items: end;
    min-height: 60vh;
  }
  .hero .ord {
    grid-column: 1 / span 1;
    font-family: var(--mono);
    font-size: 0.9em;
    font-weight: 700;
    color: var(--accent);
    align-self: start;
    letter-spacing: 0.06em;
    padding-top: 0.6em;
  }
  .hero h1 {
    grid-column: 2 / span 9;
    font-family: var(--sans);
    font-size: clamp(3em, 9.5vw, 6.4em);
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.05em;
    margin: 0 0 0.3em;
    color: var(--fg);
  }
  .hero .tagline {
    grid-column: 2 / span 8;
    font-size: 1.3em;
    line-height: 1.4;
    color: var(--muted);
    font-weight: 500;
    margin: 0;
  }
  .hero .tagline strong { color: var(--fg); }
  .hero .signal {
    grid-column: 11 / -1;
    align-self: end;
    width: 64px;
    height: 64px;
    border: 2px solid var(--accent);
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.62em;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.2;
    font-weight: 700;
    text-transform: uppercase;
  }

  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }
  a:hover { background: var(--accent); color: var(--bg); border-bottom-color: var(--accent); }

  footer {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5em;
    margin-top: 6em;
    padding: 2em 0 0;
    border-top: 1px solid var(--border);
    font-size: 0.85em;
    color: var(--muted);
  }
  footer p { grid-column: 1 / span 8; margin: 0; }
  footer p a { color: var(--muted); border-bottom: 1px solid var(--border); }
  footer p a:hover { color: var(--accent); border-bottom-color: var(--accent); background: transparent; }
  footer .coord {
    grid-column: 11 / -1;
    text-align: right;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 720px) {
    body { background-image: none; font-size: 14px; }
    .frame { padding: 1em 1em 3em; }
    .meta-row, .hero, footer { display: block; }
    .meta-row { padding: 0.6em 0; margin-bottom: 2.5em; }
    .meta-row > div { display: inline-block; margin-right: 1em; grid-column: auto; }
    .meta-row > div:last-child { display: block; text-align: left; margin-top: 0.4em; margin-right: 0; }
    .hero { min-height: 0; }
    .hero h1 { font-size: 3em; margin-bottom: 0.4em; }
    .hero .signal, .hero .ord { display: none; }
    footer p, footer .coord { grid-column: auto; text-align: left; }
    footer .coord { margin-top: 0.5em; }
  }
</style>
</head>
<body>
<div class="frame">
  <header class="meta-row">
    <div>qymdev</div>
    <div>solo</div>
    <div>2026</div>
    <div>small things</div>
  </header>

  <div class="hero">
    <div class="ord">/00</div>
    <h1>qymdev</h1>
    <p class="tagline">I like simplicity and solving small problems that make life easier for people. Working on something small that hopefully proves useful to someone else.</p>
    <div class="signal">QYM</div>
  </div>

  <footer>
    <p>Reach: <a href="mailto:qym@qymdev.com">qym@qymdev.com</a></p>
    <div class="coord">qymdev &mdash; 2026</div>
  </footer>
</div>
</body>
</html>
