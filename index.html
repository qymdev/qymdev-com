<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>qym — stealth</title>
<style>
  :root {
    --bg: #07080a;
    --fg: #e7e9ec;
    --muted: #6b7079;
    --accent: #7cf2c1;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    pointer-events: none;
  }

  .glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(600px circle at 50% 60%, rgba(124, 242, 193, 0.08), transparent 60%);
    pointer-events: none;
  }

  main {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(6px);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }

  h1 {
    margin: 28px 0 14px;
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #8a9099 120%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tagline {
    max-width: 540px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 auto;
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--accent);
    margin-left: 6px;
    transform: translateY(2px);
    animation: blink 1s steps(2) infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  footer {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 28px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  footer span:last-child {
    color: var(--fg);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <main>
    <span class="badge"><span class="dot"></span> Stealth Mode</span>
    <h1>Something<br/>is coming.</h1>
    <p class="tagline">
      We&rsquo;re heads-down building. No press, no launch date, no logo to leak.
      Check back soon<span class="cursor"></span>
    </p>
  </main>

  <footer>
    <span>qym &mdash; 2026</span>
    <span>// confidential</span>
  </footer>
</body>
</html>
